name: Build Windows EXE

on: [push, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: Build EXE
        # Ensure icon.ico exists in repo root, or remove --icon=icon.ico
        run: python -m PyInstaller --onefile -w --name Webmail --icon=icon.ico app.py 
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          # Fixed path to match the --name argument above
          path: dist/Webmail.exe    